<!DOCTYPE html>
<!--
==============================================================================
  FILE:         bejson-editor.html
  VERSION:      7.4.0
  RELATION_ID:  7dbae0dd-44a4-4d99-986d-da6f864eaf50
  AUTHOR:       Elton Boehnen
  EMAIL:        boehnenelton2024@gmail.com
  GITHUB:       github.com/boehnenelton
  SITE:         https://boehnenelton2024.pages.dev
  DESCRIPTION:  Standalone browser-based editor for BEJSON 104, 104a, and 104db
                files. No server required — open directly in any modern browser.
                Supports full CRUD, sort/pin, field management, header management,
                AES-256-GCM encryption, 104 export/import, and cell expand editor.
  CHANGELOG v7.4:
    - Added field index numbers (#n) to column headers
    - Version number now prominently displayed in App Info modal
==============================================================================
-->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BEJSON Editor v7.4</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1E1E1E;
            --input-bg: #252525;
            --input-bg-alt: #2E2E2E;
            --text-color: #FFFFFF;
            --red: #DC2626;
            --red-hover: #B91C1C;
            --dark-gray: #2B2B2B;
            --border-color: #333333;
            --selected: #7F1D1D;
            --btn-height: 50px;
        }

        /* user-select scoped — cell inputs must remain selectable */
        *, *::before, *::after { box-sizing: border-box; font-family: Arial, sans-serif; }
        body, button, label, th, td { user-select: none; }

        body { margin: 0; background-color: var(--bg-color); color: var(--text-color); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* --- Top Bar --- */
        #top-bar {
            background-color: #1A1A1A;
            border-bottom: 1px solid var(--border-color);
            flex-shrink: 0; display: flex; flex-wrap: wrap;
            align-items: center; padding: 10px 20px; gap: 10px; min-height: 70px;
        }
        #top-bar-left  { display: flex; align-items: center; gap: 10px; flex: 1 1 auto; min-width: 200px; }
        #top-bar-right { display: flex; gap: 10px; align-items: center; flex: 1 1 auto; justify-content: flex-end; flex-wrap: wrap; }
        @media (max-width: 600px) {
            #top-bar { flex-direction: column; align-items: stretch; padding: 10px; }
            #top-bar-left  { justify-content: flex-start; margin-bottom: 5px; }
            #top-bar-right { justify-content: space-between; width: 100%; }
        }
        #app-title { font-size: 20px; font-weight: bold; color: var(--red); white-space: nowrap; }

        /* Dirty-state indicator */
        .dirty-dot { color: var(--red); font-size: 22px; line-height: 1; margin-left: 2px; display: none; }
        .dirty-dot.visible { display: inline; }

        /* --- Main Frame --- */
        #main-frame { flex-grow: 1; padding: 20px; overflow: hidden; position: relative; }

        /* --- Buttons --- */
        .btn {
            background-color: var(--red); color: white; border: none;
            height: var(--btn-height); font-size: 16px; cursor: pointer;
            padding: 0 20px; display: inline-flex; align-items: center;
            justify-content: center; transition: background 0.2s; font-weight: bold; flex-shrink: 0;
        }
        .btn:hover { background-color: var(--red-hover); }
        .btn:disabled { background-color: var(--dark-gray); color: #888; cursor: not-allowed; }
        .btn-gray { background-color: var(--dark-gray); }
        .btn-gray:hover { background-color: #444; }

        /* --- Form Inputs --- */
        input[type="text"], input[type="password"], select {
            background-color: var(--input-bg); border: 1px solid var(--border-color);
            color: white; height: 45px; padding: 0 10px; font-size: 16px; width: 100%; outline: none;
        }
        input:focus { border-color: var(--red); }

        /* --- Center Panel --- */
        .center-panel {
            width: 100%; max-width: 400px; margin: 50px auto;
            background-color: var(--card-bg); padding: 30px;
            border: 1px solid var(--border-color); text-align: center;
        }
        .center-panel h2 { margin-top: 0; color: var(--text-color); margin-bottom: 20px; }
        .center-panel .btn, .center-panel select { margin-bottom: 15px; width: 100%; }

        /* --- Record Type Cards --- */
        .record-type-card {
            display: flex; align-items: center; justify-content: space-between;
            background-color: var(--card-bg); border: 1px solid var(--border-color);
            padding: 15px; margin-bottom: 10px; flex-wrap: wrap; gap: 10px;
        }
        .rt-actions { display: flex; gap: 10px; align-items: center; flex-grow: 1; justify-content: flex-end; }
        .rt-actions select { max-width: 200px; }

        /* --- Editor Table --- */
        .table-wrapper { width: 100%; height: 100%; overflow: auto; background-color: var(--bg-color); }
        table { border-collapse: collapse; width: max-content; }
        th, td { border: 1px solid var(--border-color); padding: 0; min-width: 150px; height: 50px; }
        th { position: sticky; top: 0; z-index: 10; background-color: var(--card-bg); }

        /* Row number column */
        .row-num { width: 40px; min-width: 40px; text-align: center; color: #555; font-size: 11px; background-color: var(--bg-color); position: sticky; left: 50px; z-index: 4; border-right: 1px solid #2a2a2a !important; }
        th.row-num { z-index: 11; background-color: var(--card-bg); color: #444; font-size: 11px; }

        .header-btn { width: 100%; height: 100%; background-color: var(--red); border: none; color: white; font-weight: bold; cursor: pointer; transition: background 0.15s; }
        .header-btn:hover { background-color: var(--red-hover); }
        .header-btn.selected { background-color: var(--selected); }

        /* Pinned */
        .pinned-col { background-color: #2D1A1A !important; border-left: 2px solid var(--red) !important; }
        .header-btn.pinned { background-color: var(--selected); border-bottom: 3px solid #ff4d4d; }

        /* Cell inputs */
        .cell-input {
            width: 100%; height: 100%; border: none;
            background-color: transparent; color: white;
            padding: 0 10px; font-size: 14px; cursor: pointer; user-select: text;
        }
        .cell-input:focus { background-color: #1a2a3a; outline: 2px solid var(--red); outline-offset: -2px; cursor: text; }

        .row-even { background-color: var(--input-bg); }
        .row-odd  { background-color: var(--input-bg-alt); }
        .row-check { width: 50px; min-width: 50px; text-align: center; background-color: var(--bg-color); position: sticky; left: 0; z-index: 5; }
        th.row-check { z-index: 11; }

        /* Record count badge */
        .record-count-badge { color: #888; font-size: 13px; white-space: nowrap; }

        /* --- Cell Expand Overlay --- */
        #cell-expand-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 3000; display: none;
        }
        #cell-expand-box {
            position: absolute;
            background-color: #1a1a2e;
            border: 2px solid var(--red);
            box-shadow: 0 8px 24px rgba(0,0,0,0.75);
            display: flex; flex-direction: column;
            min-width: 280px; max-width: 500px; z-index: 3001;
        }
        #cell-expand-header {
            background-color: var(--red); color: white;
            font-size: 12px; font-weight: bold; padding: 6px 10px;
            display: flex; justify-content: space-between; align-items: center; user-select: none;
        }
        #cell-expand-textarea {
            background-color: #1a1a2e; color: white; border: none;
            padding: 10px; font-size: 14px;
            font-family: 'Courier New', monospace;
            resize: none; height: 120px; outline: none; width: 100%; user-select: text;
        }
        #cell-expand-footer { display: flex; gap: 8px; padding: 8px; background-color: #111; }
        #cell-expand-footer button { flex: 1; height: 34px; border: none; cursor: pointer; font-size: 13px; font-weight: bold; }
        #cell-expand-save   { background-color: var(--red); color: white; }
        #cell-expand-save:hover { background-color: var(--red-hover); }
        #cell-expand-cancel { background-color: var(--dark-gray); color: #ccc; }
        #cell-expand-cancel:hover { background-color: #444; }

        /* --- Modals --- */
        #modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); display: none;
            justify-content: center; align-items: center; z-index: 1000;
        }
        .modal-content {
            background-color: var(--card-bg); border: 1px solid var(--border-color);
            padding: 30px; display: flex; flex-direction: column; width: 90%; max-width: 500px;
        }
        .modal-sm    { height: 320px; }
        .modal-large { height: 600px; }
        .modal-huge  { height: 850px; }
        .modal-body  { flex-grow: 1; display: flex; flex-direction: column; gap: 15px; overflow-y: auto; }
        .modal-footer { height: 60px; display: flex; gap: 20px; margin-top: 20px; flex-shrink: 0; }
        .modal-footer .btn { flex: 1; }

        /* Header Manager */
        .meta-table { width: 100%; border-collapse: collapse; }
        .meta-table td, .meta-table th { padding: 10px; border-bottom: 1px solid #333; }
        .meta-table input { height: 35px; border: 1px solid #444; }

        /* --- Context Menu --- */
        #context-menu {
            position: absolute; background-color: var(--card-bg);
            border: 1px solid var(--red); display: none; flex-direction: column;
            width: 180px; z-index: 2000; box-shadow: 0 4px 6px rgba(0,0,0,0.5);
        }
        .ctx-item { padding: 12px 15px; color: white; cursor: pointer; font-size: 14px; user-select: none; }
        .ctx-item:hover { background-color: var(--red); }
        .ctx-sep { height: 1px; background-color: var(--border-color); margin: 2px 0; }

        /* Misc */
        .text-gray { color: #888; font-size: 14px; }
        .actions-container { display: flex; gap: 10px; align-items: center; width: 100%; }
        .info-link { color: var(--red); text-decoration: none; font-weight: bold; }
        .info-link:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <!-- Cell Expand Overlay -->
    <div id="cell-expand-overlay">
        <div id="cell-expand-box">
            <div id="cell-expand-header">
                <span id="cell-expand-label">Field</span>
                <span style="opacity:0.7; font-weight:normal;">Enter=Save &nbsp; Esc=Cancel</span>
            </div>
            <textarea id="cell-expand-textarea" spellcheck="false"></textarea>
            <div id="cell-expand-footer">
                <button id="cell-expand-save">Save</button>
                <button id="cell-expand-cancel">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Context Menu -->
    <div id="context-menu"></div>

    <!-- Modal System -->
    <div id="modal-overlay"></div>

    <!-- Top Bar -->
    <div id="top-bar">
        <div id="top-bar-left">
            <div id="app-title">BEJSON Editor</div>
            <span class="dirty-dot" id="dirty-dot" title="Unsaved changes pending">●</span>
        </div>
        <div id="top-bar-right"></div>
    </div>

    <!-- Main Content -->
    <div id="main-frame"></div>

    <script>
        const APP_VERSION = "7.4";

        const SYSTEM_FIELDS = new Set([]);

        const MANDATORY_HEADERS = new Set([
            'Format', 'Format_Version', 'Format_Creator', 'Records_Type', 'Fields', 'Values'
        ]);

        const DB_TEMPLATE = {
            "Format": "BEJSON", "Format_Version": "104db", "Format_Creator": "Elton Boehnen",
            "Records_Type": ["DefaultType"],
            "Fields": [
                {"name": "Record_Type_Parent", "type": "string"},
                {"name": "field_1", "type": "string", "Record_Type_Parent": "DefaultType"}
            ], "Values": []
        };

        const ENCRYPTION_ID = "BEJSON-AES-256-GCM-PBKDF2";

        const appState = {
            dbData: null,
            fileHandle: null,
            fileName: null,
            activeRecordType: null,
            checkboxes: {},
            selectedFieldIdx: null,
            showSysFields: false,
            is104Mode: false,
            is104aMode: false,
            originalVersion: null,
            pinnedFieldIdx: null,
            sortAsc: true,
            isDirty: false,
            // Cell expand state
            expandCell: null   // { rowIdx, colIdx, inputEl }
        };

        const app = {

            // =================================================================
            // INIT
            // =================================================================
            init: function() {
                this.renderMainHub();

                document.addEventListener('click', (e) => {
                    if (!e.target.closest('#context-menu')) {
                        document.getElementById('context-menu').style.display = 'none';
                    }
                });

                document.addEventListener('keydown', (e) => {
                    if (e.key === 'Escape') {
                        this.cellExpandClose(true);
                        this.closeModal();
                    }
                });

                // Click on backdrop dismisses expand
                document.getElementById('cell-expand-overlay').addEventListener('mousedown', (e) => {
                    if (e.target === document.getElementById('cell-expand-overlay'))
                        this.cellExpandClose(true);
                });

                document.getElementById('cell-expand-save').onclick   = () => this.cellExpandClose(false);
                document.getElementById('cell-expand-cancel').onclick  = () => this.cellExpandClose(true);

                document.getElementById('cell-expand-textarea').addEventListener('keydown', (e) => {
                    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); this.cellExpandClose(false); }
                    if (e.key === 'Escape') { e.preventDefault(); this.cellExpandClose(true); }
                });
            },

            // =================================================================
            // DIRTY STATE
            // =================================================================
            markDirty: function() {
                appState.isDirty = true;
                const d = document.getElementById('dirty-dot');
                if (d) d.classList.add('visible');
            },
            markClean: function() {
                appState.isDirty = false;
                const d = document.getElementById('dirty-dot');
                if (d) d.classList.remove('visible');
            },

            // =================================================================
            // CELL EXPAND
            // =================================================================
            cellExpandOpen: function(inputEl, rowIdx, colIdx, fieldName) {
                appState.expandCell = { rowIdx, colIdx, inputEl };

                const box     = document.getElementById('cell-expand-box');
                const overlay = document.getElementById('cell-expand-overlay');
                const ta      = document.getElementById('cell-expand-textarea');

                document.getElementById('cell-expand-label').textContent = fieldName;
                ta.value = inputEl.value;

                const rect = inputEl.getBoundingClientRect();
                overlay.style.display = 'block';

                const bw = 320, bh = 190;
                let x = rect.left, y = rect.bottom + 4;
                if (x + bw > window.innerWidth  - 10) x = window.innerWidth  - bw - 10;
                if (y + bh > window.innerHeight - 10) y = rect.top - bh - 4;
                if (x < 10) x = 10;
                if (y < 10) y = 10;

                box.style.left  = x + 'px';
                box.style.top   = y + 'px';
                box.style.width = Math.max(bw, rect.width) + 'px';

                ta.focus();
                ta.select();
            },

            cellExpandClose: function(cancel) {
                const overlay = document.getElementById('cell-expand-overlay');
                if (overlay.style.display === 'none') return;
                overlay.style.display = 'none';

                if (!cancel && appState.expandCell) {
                    const { rowIdx, colIdx, inputEl } = appState.expandCell;
                    const val = document.getElementById('cell-expand-textarea').value;
                    inputEl.value = val;
                    this.updateValue(rowIdx, colIdx, val);
                }
                appState.expandCell = null;
            },

            // =================================================================
            // VIEW: MAIN HUB
            // =================================================================
            renderMainHub: function() {
                this.clearTopBar();
                this.setTopTitle("BEJSON Editor");
                document.getElementById('main-frame').innerHTML = `
                    <div class="center-panel">
                        <h2>BEJSON Editor</h2>
                        ${appState.dbData ? `
                            <button class="btn" onclick="${appState.is104Mode ? 'app.renderRecordEditor(appState.activeRecordType)' : 'app.renderDatabaseHub()'}">Resume '${this.esc(appState.fileName)}'</button>
                            <button class="btn btn-gray" onclick="app.closeDatabase()">Close File</button>
                        ` : ''}
                        <div style="margin-top:20px; border-top:1px solid #333; padding-top:20px;">
                            <button class="btn" onclick="app.createNewFileDialog()">Create New File</button>
                            <div style="margin:10px 0;">
                                <button class="btn btn-gray" onclick="app.openDatabaseFile()">Open BEJSON File...</button>
                            </div>
                        </div>
                        <div style="display:flex; gap:5px; margin-top:10px;">
                            <button class="btn btn-gray" style="flex:1; font-size:12px;" onclick="app.encryptAction()">Encrypt</button>
                            <button class="btn btn-gray" style="flex:1; font-size:12px;" onclick="app.decryptAction()">Decrypt</button>
                        </div>
                        <div style="margin-top:15px;">
                            <button class="btn btn-gray" style="font-size:12px; height:35px;" onclick="app.showAppInfo()">App Info</button>
                        </div>
                    </div>`;
            },

            // =================================================================
            // VIEW: DATABASE HUB
            // =================================================================
            renderDatabaseHub: function() {
                this.clearTopBar();
                this.addTopBtn("< Back", "btn-gray", () => this.renderMainHub(), true);
                this.addTopText(appState.fileName);

                const rightBar = document.getElementById('top-bar-right');
                const select = document.createElement('select');
                select.id = 'hub-action-select';
                select.style.width = '180px';
                [{val:'headers', txt:'Manage File Headers'}, {val:'import', txt:'Import 104 File'}, {val:'info', txt:'App Info'}]
                    .forEach(o => { const opt = document.createElement('option'); opt.value = o.val; opt.innerText = o.txt; select.appendChild(opt); });

                const btnOk  = document.createElement('button');
                btnOk.className = 'btn btn-gray'; btnOk.innerText = 'OK';
                btnOk.style.marginRight = '15px';
                btnOk.onclick = () => this.execHubAction();

                const btnAdd = document.createElement('button');
                btnAdd.className = 'btn'; btnAdd.innerText = '+ Add Type';
                btnAdd.onclick = () => this.addRecordTypeDialog();

                rightBar.appendChild(select); rightBar.appendChild(btnOk); rightBar.appendChild(btnAdd);

                const counts = this.getRecordCounts();
                let html = `<div style="height:100%; overflow-y:auto; padding-right:5px;">
                    <h2 style="margin:0 0 20px 0;">Database Record Types</h2>`;

                appState.dbData.Records_Type.forEach(rt => {
                    const safeRt = rt.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
                    html += `
                        <div class="record-type-card">
                            <div style="flex-grow:1; min-width:150px;">
                                <div style="font-size:20px; font-weight:bold;">${this.esc(rt)}</div>
                                <div class="text-gray">${counts[rt] || 0} Records</div>
                            </div>
                            <div class="rt-actions">
                                <select id="act-${this.esc(rt)}">
                                    <option value="view">View Records</option>
                                    <option value="export">Export to 104</option>
                                    <option value="rename">Rename</option>
                                    <option value="delete">Delete</option>
                                </select>
                                <button class="btn" onclick="app.execRtAction('${safeRt}')">OK</button>
                            </div>
                        </div>`;
                });
                html += "</div>";
                document.getElementById('main-frame').innerHTML = html;
            },

            execHubAction: function() {
                const val = document.getElementById('hub-action-select').value;
                if      (val === 'import')  this.import104Action();
                else if (val === 'headers') this.manageHeadersAction();
                else if (val === 'info')    this.showAppInfo();
            },

            // =================================================================
            // APP INFO
            // =================================================================
            showAppInfo: function() {
                this.showModal(`
                    <div style="text-align:center; padding:10px;">
                        <h2 style="color:var(--red); margin-bottom:5px;">BEJSON Editor</h2>
                        <div style="font-size:22px; font-weight:bold; color:white; margin-bottom:20px;">v${APP_VERSION}</div>
                        <p style="margin-bottom:15px; font-size:16px;"><strong>Author:</strong> Elton Boehnen</p>
                        <p style="margin-bottom:15px; font-size:16px;"><strong>Email:</strong><br>
                            <a href="mailto:boehnenelton2024@gmail.com" class="info-link">boehnenelton2024@gmail.com</a></p>
                        <p style="margin-bottom:15px; font-size:16px;"><strong>GitHub:</strong><br>
                            <a href="https://github.com/boehnenelton" target="_blank" class="info-link">github.com/boehnenelton</a></p>
                        <p style="margin-bottom:15px; font-size:16px;"><strong>Portfolio:</strong><br>
                            <a href="https://boehnenelton2024.pages.dev" target="_blank" class="info-link">boehnenelton2024.pages.dev</a></p>
                    </div>
                    <div class="modal-footer"><button class="btn" onclick="app.closeModal()">Close</button></div>
                `, "modal-sm");
            },

            // =================================================================
            // HEADER MANAGER
            // =================================================================
            manageHeadersAction: function() {
                // BUG FIX: check Format_Version directly — is104Mode is false for 104db
                const ver        = appState.dbData.Format_Version || "";
                const isStrict104 = (ver === "104");
                const is104a      = (ver === "104a");
                const isReadOnly  = isStrict104;
                const d = appState.dbData;
                const customKeys = Object.keys(d).filter(k => !MANDATORY_HEADERS.has(k));

                let note = '';
                if (is104a)             note = 'BEJSON 104a allows custom top-level metadata (PascalCase).';
                else if (isStrict104)   note = 'Strict BEJSON 104 forbids custom headers.';
                else if (ver.startsWith('104db')) note = 'BEJSON 104db forbids custom headers.';

                let html = `<h2>${isReadOnly ? 'View' : 'Manage'} File Headers</h2>`;
                if (note) html += `<div style="color:#aaa; margin-bottom:10px;">${note}</div>`;
                html += `<div class="modal-body"><table class="meta-table" id="header-table">
                    <tr><th>Key</th><th>Value</th><th>Action</th></tr>`;

                ['Format','Format_Version','Format_Creator'].forEach(k => {
                    html += `<tr>
                        <td><input type="text" value="${this.esc(k)}" disabled style="color:#888;"></td>
                        <td><input type="text" value="${this.esc(String(d[k] ?? ''))}" disabled style="color:#888;"></td>
                        <td style="text-align:center; color:#555;">(Locked)</td>
                    </tr>`;
                });
                customKeys.forEach(k => {
                    const val = typeof d[k] === 'object' ? JSON.stringify(d[k]) : String(d[k] ?? '');
                    html += `<tr>
                        <td><input type="text" class="h-key" value="${this.esc(k)}" ${isReadOnly ? 'disabled' : ''}></td>
                        <td><input type="text" class="h-val" value="${this.esc(val)}" ${isReadOnly ? 'disabled' : ''}></td>
                        <td>${isReadOnly ? '-' : `<button class="btn btn-gray" style="height:35px;padding:0 10px;" onclick="this.closest('tr').remove()">Del</button>`}</td>
                    </tr>`;
                });
                html += `</table>`;
                if (!isReadOnly) html += `<button class="btn btn-gray" style="margin-top:10px;" onclick="app.addHeaderRow()">+ Add Header</button>`;
                html += `</div><div class="modal-footer">
                    <button class="btn btn-gray" onclick="app.closeModal()">Cancel</button>
                    ${!isReadOnly ? '<button class="btn" onclick="app.saveHeaders()">Save Headers</button>' : ''}
                </div>`;
                this.showModal(html, "modal-large");
            },

            addHeaderRow: function() {
                const tr = document.createElement('tr');
                tr.innerHTML = `<td><input type="text" class="h-key" placeholder="New Key"></td>
                    <td><input type="text" class="h-val" placeholder="Value"></td>
                    <td><button class="btn btn-gray" style="height:35px;padding:0 10px;" onclick="this.closest('tr').remove()">Del</button></td>`;
                document.getElementById('header-table').appendChild(tr);
            },

            saveHeaders: function() {
                const rows = document.querySelectorAll('#header-table tr');
                const nh   = {};
                nh.Format         = "BEJSON";
                nh.Format_Version = appState.dbData.Format_Version;
                nh.Format_Creator = appState.dbData.Format_Creator;
                rows.forEach((row, i) => {
                    if (i === 0) return;
                    const inputs = row.querySelectorAll('input');
                    if (inputs.length === 2 && !inputs[0].disabled) {
                        const k = inputs[0].value.trim();
                        if (k && !MANDATORY_HEADERS.has(k)) nh[k] = inputs[1].value;
                    }
                });
                nh.Records_Type = appState.dbData.Records_Type;
                nh.Fields       = appState.dbData.Fields;
                nh.Values       = appState.dbData.Values;
                appState.dbData = nh;
                this.closeModal();
                this.saveDatabase();
            },

            // =================================================================
            // VIEW: RECORD EDITOR
            // =================================================================
            renderRecordEditor: function(recordType) {
                if (appState.activeRecordType !== recordType) appState.pinnedFieldIdx = null;
                appState.activeRecordType = recordType;
                appState.checkboxes       = {};
                appState.selectedFieldIdx = null;

                this.clearTopBar();
                if (appState.is104Mode) this.addTopBtn("Close File", "btn-gray", () => this.closeDatabase(), true);
                else                    this.addTopBtn("< Back",     "btn-gray", () => this.renderDatabaseHub(), true);

                this.addTopText(recordType + (appState.is104aMode ? " (104a)" : appState.is104Mode ? " (104)" : ""));

                // Record count badge
                const rtpIdx      = this.getFieldIndex('Record_Type_Parent');
                const recordCount = appState.dbData.Values.filter(v => v[rtpIdx] === recordType).length;
                const badge = document.createElement('span');
                badge.className   = 'record-count-badge';
                badge.textContent = `${recordCount} record${recordCount !== 1 ? 's' : ''}`;
                document.getElementById('top-bar-left').appendChild(badge);

                // Actions
                const div = document.createElement('div');
                div.className = 'actions-container';
                div.innerHTML = `
                    <div class="actions-container" style="display:inline-flex;">
                        <label style="white-space:nowrap; user-select:none;">
                            <input type="checkbox" id="chk-sys" ${appState.showSysFields ? 'checked' : ''} onchange="app.toggleSysFields(this.checked)"> RTP
                        </label>
                        <select id="editor-action" style="flex-grow:1; min-width:160px;">
                            <option value="" disabled selected>Action...</option>
                            <optgroup label="Record Actions">
                                <option>Add New Record</option>
                                <option>Delete Selected Record(s)</option>
                                <option>Duplicate Selected Record</option>
                                <option>Copy Active Value</option>
                                <option>Paste to Active</option>
                            </optgroup>
                            <optgroup label="View Actions">
                                <option>Reset Sort &amp; Pin</option>
                            </optgroup>
                            <optgroup label="Field Actions">
                                <option>Add Field</option>
                                <option>Edit Selected Field</option>
                                <option>Delete Selected Field</option>
                            </optgroup>
                            <optgroup label="File Actions">
                                <option>Manage Headers</option>
                                <option>Export to BEJSON 104</option>
                                <option>Save As...</option>
                                <option>App Info</option>
                            </optgroup>
                        </select>
                        <button class="btn" onclick="app.execEditorAction()">OK</button>
                    </div>`;
                document.getElementById('top-bar-right').appendChild(div);

                // Build field list
                let fields = appState.dbData.Fields.map((f, i) => ({...f, orgIdx: i}))
                    .filter(f => {
                        const isSys     = SYSTEM_FIELDS.has(f.name) || f.name === 'Record_Type_Parent';
                        const matchType = !f.Record_Type_Parent || f.Record_Type_Parent === recordType;
                        return matchType && (appState.showSysFields || !isSys);
                    });

                if (appState.pinnedFieldIdx !== null) {
                    const pin = fields.find(f => f.orgIdx === appState.pinnedFieldIdx);
                    if (pin) { fields = fields.filter(f => f.orgIdx !== appState.pinnedFieldIdx); fields.unshift(pin); }
                }

                const records = appState.dbData.Values
                    .map((v, i) => ({val: v, orgIdx: i}))
                    .filter(r => r.val[rtpIdx] === recordType);

                // Build table HTML
                let t = `<div class="table-wrapper"><table><thead><tr>`;
                t += `<th class="row-check"><input type="checkbox" onchange="app.toggleSelectAll(this.checked)"></th>`;
                t += `<th class="row-num">#</th>`;
                fields.forEach(f => {
                    const isPinned = f.orgIdx === appState.pinnedFieldIdx;
                    const pinCls   = isPinned ? 'pinned' : '';
                    const sortIco  = isPinned ? (appState.sortAsc ? ' &#9650;' : ' &#9660;') : '';
                    t += `<th><button class="header-btn ${pinCls}" id="hdr-${f.orgIdx}"
                            onclick="app.selectField(${f.orgIdx})"
                            oncontextmenu="app.headerContextMenu(event, ${f.orgIdx})">
                            ${this.esc(f.name)}${sortIco}<br><small>(${f.type}) <span style="opacity:0.5;">#${f.orgIdx}</span></small>
                        </button></th>`;
                });
                t += `</tr></thead><tbody>`;

                if (records.length === 0) {
                    t += `<tr><td colspan="${fields.length + 2}" style="padding:20px; text-align:center; color:#888;">No records. Use Action → Add New Record.</td></tr>`;
                } else {
                    records.forEach((row, rIdx) => {
                        const bg = rIdx % 2 === 0 ? 'row-even' : 'row-odd';
                        t += `<tr>`;
                        t += `<td class="row-check ${bg}"><input type="checkbox" class="rec-chk" data-idx="${row.orgIdx}"></td>`;
                        t += `<td class="row-num ${bg}">${rIdx + 1}</td>`;
                        fields.forEach(f => {
                            const val        = row.val[f.orgIdx];
                            const isSys      = SYSTEM_FIELDS.has(f.name);
                            const pinnedCls  = f.orgIdx === appState.pinnedFieldIdx ? 'pinned-col' : '';
                            if (f.type === 'boolean') {
                                const dis = isSys ? 'disabled style="opacity:0.6"' : '';
                                t += `<td class="${bg} ${pinnedCls}" style="text-align:center;">
                                    <input type="checkbox" ${val ? 'checked' : ''} ${dis}
                                        onchange="app.updateValue(${row.orgIdx}, ${f.orgIdx}, this.checked)">
                                </td>`;
                            } else {
                                const sv  = (val === null || val === undefined) ? '' : this.esc(String(val));
                                const dis = isSys ? 'disabled style="opacity:0.6"' : '';
                                const fn  = f.name.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
                                t += `<td class="${bg} ${pinnedCls}">
                                    <input type="text" class="cell-input" value="${sv}" ${dis}
                                        onchange="app.updateValue(${row.orgIdx}, ${f.orgIdx}, this.value)"
                                        ondblclick="app.cellExpandOpen(this, ${row.orgIdx}, ${f.orgIdx}, '${fn}')"
                                        oncontextmenu="app.inputContextMenu(event, this, ${row.orgIdx}, ${f.orgIdx}, '${fn}')">
                                </td>`;
                            }
                        });
                        t += `</tr>`;
                    });
                }
                t += `</tbody></table></div>`;
                document.getElementById('main-frame').innerHTML = t;
            },

            // =================================================================
            // ACTIONS
            // =================================================================
            closeDatabase: function() {
                Object.assign(appState, {
                    dbData: null, fileHandle: null, fileName: null,
                    is104Mode: false, is104aMode: false, originalVersion: null,
                    pinnedFieldIdx: null, isDirty: false
                });
                this.markClean();
                this.renderMainHub();
            },

            // =================================================================
            // LEGACY MIGRATION
            // =================================================================
            migrateLegacyData: function() {
                const d = appState.dbData;
                if (!d) return;
                const LEGACY_RT     = 'Gemini_Keys';
                const LEGACY_FIELDS = new Set(['System_Record_Identifier','Version','Last_Modified','AppStateJSON','api_key']);

                if (d.Records_Type.includes(LEGACY_RT)) {
                    const ri = d.Fields.findIndex(f => f.name === 'Record_Type_Parent');
                    if (ri > -1) d.Values = d.Values.filter(r => r[ri] !== LEGACY_RT);
                    d.Records_Type = d.Records_Type.filter(t => t !== LEGACY_RT);
                }
                const idIdx = d.Fields.findIndex(f => f.name === 'System_Record_Identifier');
                if (idIdx > -1) d.Values = d.Values.filter(r => r[idIdx] !== '__DATABASE_METADATA__');

                d.Fields
                    .map((f, i) => LEGACY_FIELDS.has(f.name) ? i : -1)
                    .filter(i => i !== -1).sort((a,b) => b - a)
                    .forEach(i => { d.Fields.splice(i, 1); d.Values.forEach(row => row.splice(i, 1)); });
            },

            // =================================================================
            // OPEN FILE
            // =================================================================
            openDatabaseFile: async function() {
                try {
                    const [handle] = await window.showOpenFilePicker({
                        types: [{ description: 'BEJSON Files', accept: {'application/json': ['.bejson','.json']} }]
                    });
                    const file = await handle.getFile();
                    const json = JSON.parse(await file.text());

                    appState.fileHandle     = handle;
                    appState.fileName       = file.name;
                    appState.dbData         = json;
                    appState.pinnedFieldIdx = null;
                    this.markClean();

                    const ver = json.Format_Version || "";
                    if (ver.startsWith("104db")) {
                        appState.is104Mode = false; appState.is104aMode = false;
                        this.migrateLegacyData(); this.ensureIntegrity(); this.renderDatabaseHub();
                    } else if (ver.startsWith("104")) {
                        appState.is104Mode  = true;
                        appState.is104aMode = (ver === "104a");
                        appState.originalVersion = ver;
                        if (!json.Records_Type || json.Records_Type.length !== 1)
                            return alert("104 file must have exactly one Record Type defined.");
                        const rt = json.Records_Type[0];
                        appState.activeRecordType = rt;
                        if (!json.Fields.length || json.Fields[0].name !== "Record_Type_Parent") {
                            json.Fields.unshift({name:"Record_Type_Parent",type:"string"});
                            json.Values.forEach(row => row.unshift(rt));
                        }
                        json.Fields.forEach(f => { if (f.name !== "Record_Type_Parent" && !f.Record_Type_Parent) f.Record_Type_Parent = rt; });
                        this.ensureIntegrity(); this.renderRecordEditor(rt);
                    } else {
                        alert("Unknown or unsupported BEJSON version: " + ver);
                    }
                } catch (e) { if (e.name !== 'AbortError') { console.error(e); alert("Error opening file: " + e.message); } }
            },

            // =================================================================
            // CREATE FILE
            // =================================================================
            createNewFileDialog: async function() {
                this.showModal(`<h2>Create New File</h2>
                    <div class="modal-body">
                        <label>Filename:</label>
                        <input type="text" id="new-fname" placeholder="my_data.bejson">
                        <label>Format:</label>
                        <select id="new-format">
                            <option value="104db">BEJSON 104db (Relational Database)</option>
                            <option value="104">BEJSON 104 (Strict Single Entity)</option>
                            <option value="104a">BEJSON 104a (Automation/Configs)</option>
                        </select>
                        <label>Record Type Name:</label>
                        <input type="text" id="new-rt" value="DefaultType">
                    </div>
                    <div class="modal-footer">
                        <button class="btn btn-gray" onclick="app.closeModal()">Cancel</button>
                        <button class="btn" onclick="app.finishCreate()">Create</button>
                    </div>`, "modal-large");
            },

            finishCreate: async function() {
                const fname  = document.getElementById('new-fname').value.trim();
                const format = document.getElementById('new-format').value;
                const rt     = document.getElementById('new-rt').value.trim() || "DefaultType";
                if (!fname) return alert("Filename required.");

                appState.fileName       = fname.endsWith('.bejson') ? fname : fname + '.bejson';
                appState.pinnedFieldIdx = null;
                appState.dbData         = JSON.parse(JSON.stringify(DB_TEMPLATE));
                appState.dbData.Records_Type = [rt];
                appState.dbData.Fields.find(f => f.name === 'field_1').Record_Type_Parent = rt;

                if (format === "104db") {
                    appState.is104Mode = false; appState.is104aMode = false;
                    appState.dbData.Format_Version = "104db";
                    this.ensureIntegrity(); this.closeModal();
                    await this.saveDatabaseAs(); this.renderDatabaseHub();
                } else {
                    appState.is104Mode  = true; appState.is104aMode = (format === "104a");
                    appState.originalVersion = format;
                    appState.dbData.Format_Version = format;
                    this.ensureIntegrity(); this.closeModal();
                    await this.saveDatabaseAs(); this.renderRecordEditor(rt);
                }
            },

            // =================================================================
            // SAVE
            // =================================================================
            saveDatabase: async function() {
                let obj = appState.dbData;
                if (appState.is104Mode) {
                    obj = JSON.parse(JSON.stringify(appState.dbData));
                    const ri = obj.Fields.findIndex(f => f.name === 'Record_Type_Parent');
                    if (ri > -1) { obj.Fields.splice(ri, 1); obj.Values.forEach(row => row.splice(ri, 1)); }
                    obj.Fields.forEach(f => delete f.Record_Type_Parent);
                    obj.Format_Version = appState.originalVersion;
                }
                const content = JSON.stringify(obj, null, 2);
                if (appState.fileHandle) {
                    try {
                        const w = await appState.fileHandle.createWritable();
                        await w.write(content); await w.close();
                        this.markClean();
                    } catch(e) { console.error("Save failed:", e); this.downloadFile(appState.fileName || 'database.bejson', content); this.markClean(); }
                } else {
                    this.downloadFile(appState.fileName || 'database.bejson', content);
                    this.markClean();
                }
            },

            saveDatabaseAs: async function() {
                try {
                    const handle = await window.showSaveFilePicker({
                        suggestedName: appState.fileName,
                        types: [{ description: 'BEJSON File', accept: {'application/json': ['.bejson','.json']} }]
                    });
                    appState.fileHandle = handle;
                    await this.saveDatabase();
                    return true;
                } catch(e) { return false; }
            },

            downloadFile: function(filename, content) {
                const a = Object.assign(document.createElement('a'), {
                    href: URL.createObjectURL(new Blob([content], {type:'application/json'})),
                    download: filename
                });
                a.click(); URL.revokeObjectURL(a.href);
            },

            // =================================================================
            // RT ACTIONS
            // =================================================================
            execRtAction: function(rt) {
                const act = document.getElementById('act-' + rt).value;
                if      (act === 'view')   this.renderRecordEditor(rt);
                else if (act === 'export') this.export104(rt);
                else if (act === 'rename') this.renameRt(rt);
                else if (act === 'delete') this.deleteRt(rt);
            },

            export104: function(rt) {
                const out = { "Format":"BEJSON","Format_Version":"104","Format_Creator": appState.dbData.Format_Creator || "Elton Boehnen","Records_Type":[rt],"Fields":[],"Values":[] };
                const idx = [];
                appState.dbData.Fields.forEach((f, i) => {
                    if (f.name === 'Record_Type_Parent') return;
                    if (f.Record_Type_Parent === rt || !f.Record_Type_Parent) { idx.push(i); out.Fields.push({name:f.name,type:f.type}); }
                });
                const ri = this.getFieldIndex('Record_Type_Parent');
                appState.dbData.Values.forEach(row => { if (row[ri] === rt) out.Values.push(idx.map(i => row[i])); });
                this.downloadFile(`${rt}_export.json`, JSON.stringify(out, null, 2));
            },

            import104Action: async function() {
                if (appState.is104Mode) return alert("Cannot import into a single-type 104 file.");
                try {
                    const [handle] = await window.showOpenFilePicker({
                        types: [{ description: 'BEJSON 104', accept: {'application/json': ['.json','.bejson']} }]
                    });
                    const file   = await handle.getFile();
                    const imp    = JSON.parse(await file.text());

                    if (imp.Format !== "BEJSON")              return alert("Not a valid BEJSON file.");
                    if (!imp.Format_Version.startsWith("104")) return alert("Version must be 104 or 104a.");
                    if (imp.Records_Type.length !== 1)         return alert("Import file must have exactly one Record Type.");

                    const importRt = imp.Records_Type[0];
                    if (appState.dbData.Records_Type.includes(importRt)) return alert(`Record Type '${importRt}' already exists.`);

                    appState.dbData.Records_Type.push(importRt);
                    const indexMap = [];
                    imp.Fields.forEach((f, i) => {
                        let di = appState.dbData.Fields.findIndex(x => x.name === f.name && !x.Record_Type_Parent);
                        if (di === -1) {
                            appState.dbData.Fields.push({name:f.name, type:f.type, Record_Type_Parent:importRt});
                            di = appState.dbData.Fields.length - 1;
                            appState.dbData.Values.forEach(r => r.push(null));
                        }
                        indexMap[i] = di;
                    });
                    const ri   = this.getFieldIndex('Record_Type_Parent');
                    const cols = appState.dbData.Fields.length;
                    imp.Values.forEach(row => {
                        const nr = new Array(cols).fill(null);
                        nr[ri] = importRt;
                        row.forEach((v, i) => { if (indexMap[i] !== undefined) nr[indexMap[i]] = v; });
                        appState.dbData.Values.push(nr);
                    });
                    this.ensureIntegrity();
                    await this.saveDatabase();
                    this.renderDatabaseHub();
                    alert(`Imported '${importRt}' with ${imp.Values.length} records.`);
                } catch(e) { if (e.name !== 'AbortError') { console.error(e); alert("Import failed: " + e.message); } }
            },

            // =================================================================
            // EDITOR ACTION DISPATCHER
            // =================================================================
            execEditorAction: async function() {
                const sel = document.getElementById('editor-action');
                const act = sel ? sel.value : '';
                const rt  = appState.activeRecordType;

                if (act === 'Add New Record') {
                    const ri  = this.getFieldIndex('Record_Type_Parent');
                    const row = new Array(appState.dbData.Fields.length).fill(null);
                    row[ri] = rt;
                    appState.dbData.Values.push(row);
                    await this.saveAndRefresh();

                } else if (act === 'Delete Selected Record(s)') {
                    const checks = document.querySelectorAll('.rec-chk:checked');
                    if (!checks.length) return alert("Select records first.");
                    if (!confirm(`Delete ${checks.length} record${checks.length > 1 ? 's' : ''}?`)) return;
                    const del = new Set(Array.from(checks).map(c => +c.dataset.idx));
                    appState.dbData.Values = appState.dbData.Values.filter((_, i) => !del.has(i));
                    await this.saveAndRefresh();

                } else if (act === 'Duplicate Selected Record') {
                    const checks = document.querySelectorAll('.rec-chk:checked');
                    if (!checks.length) return alert("Select a record first.");
                    Array.from(checks).map(c => +c.dataset.idx)
                        .forEach(i => appState.dbData.Values.push([...appState.dbData.Values[i]]));
                    await this.saveAndRefresh();

                } else if (act === 'Copy Active Value') {
                    const el = document.activeElement;
                    if (el && el.classList.contains('cell-input')) {
                        try { await navigator.clipboard.writeText(el.value); alert("Copied!"); }
                        catch(e) { alert("Error: " + e); }
                    } else alert("Click a cell first.");

                } else if (act === 'Paste to Active') {
                    const el = document.activeElement;
                    if (el && el.classList.contains('cell-input')) {
                        try { const t = await navigator.clipboard.readText(); el.value = t; el.dispatchEvent(new Event('change')); }
                        catch(e) { alert("Clipboard blocked. Use Ctrl+V."); }
                    } else alert("Click a cell first.");

                } else if (act === 'Reset Sort & Pin') {
                    this.resetView();

                } else if (act === 'Add Field') {
                    this.showFieldDialog(null);

                } else if (act === 'Edit Selected Field') {
                    if (appState.selectedFieldIdx === null) return alert("Click a column header first.");
                    const f = appState.dbData.Fields[appState.selectedFieldIdx];
                    if (SYSTEM_FIELDS.has(f.name)) return alert("Cannot edit system fields.");
                    this.showFieldDialog(f, appState.selectedFieldIdx);

                } else if (act === 'Delete Selected Field') {
                    if (appState.selectedFieldIdx === null) return alert("Click a column header first.");
                    const f = appState.dbData.Fields[appState.selectedFieldIdx];
                    if (SYSTEM_FIELDS.has(f.name)) return alert("Cannot delete system fields.");
                    if (!confirm(`Delete field '${f.name}'?`)) return;
                    appState.dbData.Fields.splice(appState.selectedFieldIdx, 1);
                    appState.dbData.Values.forEach(row => row.splice(appState.selectedFieldIdx, 1));
                    appState.selectedFieldIdx = null;
                    await this.saveAndRefresh();

                } else if (act === 'Export to BEJSON 104') { this.export104(rt);
                } else if (act === 'Save As...')           { await this.saveDatabaseAs();
                } else if (act === 'Manage Headers')       { this.manageHeadersAction();
                } else if (act === 'App Info')             { this.showAppInfo(); }

                if (sel) sel.value = '';
            },

            // =================================================================
            // SORT & PIN
            // =================================================================
            sortData: function(colIdx, asc) {
                appState.pinnedFieldIdx = colIdx; appState.sortAsc = asc;
                const ri   = this.getFieldIndex('Record_Type_Parent');
                const rt   = appState.activeRecordType;
                const type = appState.dbData.Fields[colIdx].type;
                let typeRows = [], otherRows = [];
                appState.dbData.Values.forEach(row => (row[ri] === rt ? typeRows : otherRows).push(row));
                typeRows.sort((a, b) => {
                    let vA = a[colIdx], vB = b[colIdx];
                    if (vA == null) vA = (type === 'number' || type === 'integer') ? -Infinity : "";
                    if (vB == null) vB = (type === 'number' || type === 'integer') ? -Infinity : "";
                    if (type === 'number' || type === 'integer') return asc ? vA - vB : vB - vA;
                    if (type === 'boolean') return asc ? Number(vA) - Number(vB) : Number(vB) - Number(vA);
                    return asc
                        ? String(vA).localeCompare(String(vB), undefined, {numeric:true,sensitivity:'base'})
                        : String(vB).localeCompare(String(vA), undefined, {numeric:true,sensitivity:'base'});
                });
                appState.dbData.Values = [...otherRows, ...typeRows];
                this.saveDatabase(); this.renderRecordEditor(rt);
            },

            resetView: function() { appState.pinnedFieldIdx = null; this.renderRecordEditor(appState.activeRecordType); },

            // =================================================================
            // CONTEXT MENUS
            // =================================================================
            headerContextMenu: function(e, colIdx) {
                e.preventDefault();
                const fname = appState.dbData.Fields[colIdx].name;
                document.getElementById('context-menu').innerHTML = `
                    <div style="padding:5px 10px; font-weight:bold; color:var(--red); border-bottom:1px solid #333; font-size:12px;">${this.esc(fname)}</div>
                    <div class="ctx-item" onclick="app.sortData(${colIdx}, true)">Sort A→Z (Pin)</div>
                    <div class="ctx-item" onclick="app.sortData(${colIdx}, false)">Sort Z→A (Pin)</div>
                    <div class="ctx-sep"></div>
                    <div class="ctx-item" onclick="app.selectField(${colIdx}); document.getElementById('editor-action').value='Edit Selected Field'; app.execEditorAction();">Edit Field</div>
                    <div class="ctx-sep"></div>
                    <div class="ctx-item" onclick="app.resetView()">Unpin / Reset</div>`;
                this.showContextMenuAt(e);
            },

            inputContextMenu: function(e, input, rowIdx, colIdx, fieldName) {
                e.preventDefault();
                this._ctxInput = input;
                const fn = fieldName.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
                document.getElementById('context-menu').innerHTML = `
                    <div style="padding:5px 10px; font-weight:bold; color:var(--red); border-bottom:1px solid #333; font-size:12px;">${this.esc(fieldName)}</div>
                    <div class="ctx-item" onclick="app.cellExpandOpen(app._ctxInput, ${rowIdx}, ${colIdx}, '${fn}'); document.getElementById('context-menu').style.display='none';">✎ Expand Editor</div>
                    <div class="ctx-sep"></div>
                    <div class="ctx-item" onclick="app.ctxCopy()">Copy</div>
                    <div class="ctx-item" onclick="app.ctxPaste()">Paste</div>
                    <div class="ctx-sep"></div>
                    <div class="ctx-item" onclick="app.ctxClear(${rowIdx}, ${colIdx})">Clear (→ null)</div>`;
                this.showContextMenuAt(e);
            },

            showContextMenuAt: function(e) {
                const menu = document.getElementById('context-menu');
                menu.style.visibility = 'hidden'; menu.style.display = 'flex';
                const mw = 180;
                let x = e.pageX, y = e.pageY;
                if (x + mw > window.innerWidth) x -= mw;
                menu.style.left = x + 'px'; menu.style.top = y + 'px';
                menu.style.visibility = 'visible';
            },

            ctxCopy: function() {
                if (this._ctxInput) { this._ctxInput.select(); document.execCommand('copy'); }
                document.getElementById('context-menu').style.display = 'none';
            },
            ctxPaste: async function() {
                if (this._ctxInput) {
                    try { const t = await navigator.clipboard.readText(); this._ctxInput.value = t; this._ctxInput.dispatchEvent(new Event('change')); }
                    catch(e) { alert("Use Ctrl+V"); }
                }
                document.getElementById('context-menu').style.display = 'none';
            },
            ctxClear: function(rowIdx, colIdx) {
                appState.dbData.Values[rowIdx][colIdx] = null;
                this.saveDatabase(); this.renderRecordEditor(appState.activeRecordType);
                document.getElementById('context-menu').style.display = 'none';
            },

            // =================================================================
            // MODALS
            // =================================================================
            showModal: function(html, sizeClass = "modal-large") {
                const ov = document.getElementById('modal-overlay');
                ov.innerHTML = `<div class="modal-content ${sizeClass}">${html}</div>`;
                ov.style.display = 'flex';
            },
            closeModal: function() {
                const ov = document.getElementById('modal-overlay');
                if (ov) ov.style.display = 'none';
            },
            showLargeInput: function(title, label) {
                return new Promise(resolve => {
                    this.showModal(`<h2>${title}</h2>
                        <div class="modal-body"><label>${label}</label>
                            <input type="text" id="modal-input" style="font-size:18px;">
                        </div>
                        <div class="modal-footer">
                            <button class="btn btn-gray" onclick="app.closeModalResolve(null)">Cancel</button>
                            <button class="btn" onclick="app.closeModalResolve(document.getElementById('modal-input').value)">OK</button>
                        </div>`, "modal-sm");
                    this.modalResolver = resolve;
                    setTimeout(() => { const el = document.getElementById('modal-input'); if (el) el.focus(); }, 80);
                });
            },
            closeModalResolve: function(val) { this.closeModal(); if (this.modalResolver) { this.modalResolver(val); this.modalResolver = null; } },

            showFieldDialog: function(fieldData, idx = null) {
                const isEdit = !!fieldData;
                const field  = fieldData || {name:'', type:'string', Record_Type_Parent: appState.activeRecordType};
                const mapDis = appState.is104Mode ? 'disabled' : '';
                const cxDis  = appState.is104aMode ? 'disabled style="color:#666"' : '';
                this.showModal(`<h2>${isEdit ? 'Edit Field' : 'Add Field (comma-separate for multiple)'}</h2>
                    <div class="modal-body">
                        <label>Name:</label>
                        <input type="text" id="fd-name" value="${this.esc(field.name)}">
                        <label>Type:</label>
                        <select id="fd-type">
                            <option value="string">string</option><option value="number">number</option>
                            <option value="integer">integer</option><option value="boolean">boolean</option>
                            <option value="array" ${cxDis}>array${appState.is104aMode ? ' (N/A in 104a)' : ''}</option>
                            <option value="object" ${cxDis}>object${appState.is104aMode ? ' (N/A in 104a)' : ''}</option>
                        </select>
                        <label>Record Type:</label>
                        <select id="fd-map" ${mapDis}>
                            <option value="(Common Field)">(Common Field)</option>
                            ${appState.dbData.Records_Type.map(rt => `<option value="${this.esc(rt)}">${this.esc(rt)}</option>`).join('')}
                        </select>
                    </div>
                    <div class="modal-footer">
                        <button class="btn btn-gray" onclick="app.closeModal()">Cancel</button>
                        <button class="btn" onclick="app.saveField(${idx})">Save</button>
                    </div>`, "modal-huge");
                document.getElementById('fd-type').value = field.type;
                document.getElementById('fd-map').value  = appState.is104Mode ? appState.activeRecordType : (field.Record_Type_Parent || "(Common Field)");
            },

            saveField: async function(idx) {
                const nameInput = document.getElementById('fd-name').value;
                const type      = document.getElementById('fd-type').value;
                const mapVal    = document.getElementById('fd-map').value;
                if (appState.is104aMode && (type === 'array' || type === 'object')) return alert("Complex types forbidden in 104a.");
                const map = appState.is104Mode ? appState.activeRecordType : mapVal;
                if (!nameInput.trim()) return alert("Name required.");
                const names = nameInput.split(',').map(n => n.trim()).filter(Boolean);
                if (!names.length) return alert("Invalid name(s).");
                if (idx !== null) {
                    if (names.length > 1) return alert("Cannot rename to multiple fields.");
                    const nf = {name: names[0], type};
                    if (map !== "(Common Field)") nf.Record_Type_Parent = map;
                    appState.dbData.Fields[idx] = nf;
                } else {
                    names.forEach(name => {
                        const exists = appState.dbData.Fields.find(f => f.name === name && (f.Record_Type_Parent === map || (!f.Record_Type_Parent && map === "(Common Field)")));
                        if (!exists) {
                            const nf = {name, type};
                            if (map !== "(Common Field)") nf.Record_Type_Parent = map;
                            appState.dbData.Fields.push(nf);
                            appState.dbData.Values.forEach(r => r.push(null));
                        }
                    });
                }
                this.closeModal();
                await this.saveAndRefresh();
            },

            // =================================================================
            // ENCRYPTION
            // =================================================================
            encryptAction: async function() {
                if (!appState.dbData) return alert("Load a DB first.");
                const pwd = await this.showLargeInput("Encrypt", "Enter Password:");
                if (!pwd) return;
                const salt = crypto.getRandomValues(new Uint8Array(16));
                const iv   = crypto.getRandomValues(new Uint8Array(12));
                const key  = await this.deriveKey(pwd, salt);
                const ct   = await crypto.subtle.encrypt({name:"AES-GCM", iv}, key, new TextEncoder().encode(JSON.stringify(appState.dbData)));
                this.downloadFile(
                    (appState.fileName || "db").replace('.bejson', '.bjsenc'),
                    JSON.stringify({encryptionFormat:ENCRYPTION_ID, salt:this.ab2base64(salt), iv:this.ab2base64(iv), ciphertext:this.ab2base64(ct)}, null, 2)
                );
            },

            decryptAction: async function() {
                try {
                    const [handle] = await window.showOpenFilePicker({
                        types: [{ description: 'Encrypted BEJSON', accept: {'application/json': ['.bjsenc']} }]
                    });
                    // BUG FIX: read file once, capture filename before async deriveKey
                    const file     = await handle.getFile();
                    const fileName = file.name;
                    const pkg      = JSON.parse(await file.text());

                    if (pkg.encryptionFormat !== ENCRYPTION_ID) return alert("Invalid encryption format.");
                    const pwd = await this.showLargeInput("Decrypt", "Enter Password:");
                    if (!pwd) return;
                    try {
                        const key = await this.deriveKey(pwd, this.base642ab(pkg.salt));
                        const dec = await crypto.subtle.decrypt({name:"AES-GCM", iv:this.base642ab(pkg.iv)}, key, this.base642ab(pkg.ciphertext));
                        appState.dbData     = JSON.parse(new TextDecoder().decode(dec));
                        appState.fileName   = fileName.replace('.bjsenc','_decrypted.bejson');
                        appState.fileHandle = null;
                        this.markClean();
                        const ver = appState.dbData.Format_Version || "";
                        if (ver.startsWith("104db")) {
                            appState.is104Mode = false; appState.is104aMode = false;
                            this.migrateLegacyData(); this.ensureIntegrity(); this.renderDatabaseHub();
                        } else if (ver.startsWith("104")) {
                            appState.is104Mode = true; appState.is104aMode = (ver === "104a");
                            appState.originalVersion = ver;
                            const rt = appState.dbData.Records_Type[0]; appState.activeRecordType = rt;
                            if (!appState.dbData.Fields.length || appState.dbData.Fields[0].name !== "Record_Type_Parent") {
                                appState.dbData.Fields.unshift({name:"Record_Type_Parent",type:"string"});
                                appState.dbData.Values.forEach(row => row.unshift(rt));
                            }
                            this.ensureIntegrity(); this.renderRecordEditor(rt);
                        } else { this.ensureIntegrity(); this.renderDatabaseHub(); }
                        alert("Decrypted successfully.");
                    } catch(e) { alert("Decryption failed. Wrong password?"); }
                } catch(e) { if (e.name !== 'AbortError') console.error(e); }
            },

            deriveKey: async function(pwd, salt) {
                const km = await crypto.subtle.importKey("raw", new TextEncoder().encode(pwd), {name:"PBKDF2"}, false, ["deriveKey"]);
                return crypto.subtle.deriveKey({name:"PBKDF2", salt, iterations:100000, hash:"SHA-256"}, km, {name:"AES-GCM", length:256}, false, ["encrypt","decrypt"]);
            },

            // BUG FIX: loop-based base64 avoids call-stack overflow on large buffers
            ab2base64: function(buf) {
                const b = new Uint8Array(buf); let s = '';
                for (let i = 0; i < b.length; i++) s += String.fromCharCode(b[i]);
                return btoa(s);
            },
            base642ab: function(b64) {
                const s = atob(b64); return new Uint8Array(s.length).map((_, i) => s.charCodeAt(i));
            },

            // =================================================================
            // HELPERS
            // =================================================================
            ensureIntegrity: function() {
                if (!appState.dbData.Fields.find(f => f.name === 'Record_Type_Parent')) {
                    appState.dbData.Fields.unshift({name:'Record_Type_Parent', type:'string'});
                    appState.dbData.Values.forEach(row => row.unshift(null));
                }
            },

            getFieldIndex: function(name) { return appState.dbData.Fields.findIndex(f => f.name === name); },

            getRecordCounts: function() {
                const counts = {}, ri = this.getFieldIndex('Record_Type_Parent');
                appState.dbData.Values.forEach(row => {
                    const t = row[ri];
                    if (t && t !== '__DATABASE_METADATA__') counts[t] = (counts[t] || 0) + 1;
                });
                return counts;
            },

            addRecordTypeDialog: async function() {
                const name = await this.showLargeInput("Add Record Type", "Enter new record type name:");
                if (!name) return;
                const t = name.trim();
                if (!t) return;
                if (appState.dbData.Records_Type.includes(t)) return alert("Record type already exists.");
                appState.dbData.Records_Type.push(t);
                await this.saveDatabase(); this.renderDatabaseHub();
            },

            renameRt: async function(oldName) {
                const newName = await this.showLargeInput("Rename", `Rename '${oldName}' to:`);
                if (!newName || newName === oldName) return;
                const ri = this.getFieldIndex('Record_Type_Parent');
                appState.dbData.Records_Type = appState.dbData.Records_Type.map(r => r === oldName ? newName : r);
                appState.dbData.Fields.forEach(f => { if (f.Record_Type_Parent === oldName) f.Record_Type_Parent = newName; });
                appState.dbData.Values.forEach(row => { if (row[ri] === oldName) row[ri] = newName; });
                await this.saveDatabase(); this.renderDatabaseHub();
            },

            deleteRt: async function(rt) {
                if (!confirm(`Delete '${rt}' and ALL its data?`)) return;
                const ri = this.getFieldIndex('Record_Type_Parent');
                appState.dbData.Values = appState.dbData.Values.filter(r => r[ri] !== rt);
                appState.dbData.Records_Type = appState.dbData.Records_Type.filter(t => t !== rt);
                await this.saveDatabase(); this.renderDatabaseHub();
            },

            clearTopBar: function() {
                document.getElementById('top-bar-left').innerHTML  = '<div id="app-title">BEJSON Editor</div><span class="dirty-dot" id="dirty-dot" title="Unsaved changes pending">●</span>';
                document.getElementById('top-bar-right').innerHTML = '';
                if (appState.isDirty) document.getElementById('dirty-dot').classList.add('visible');
            },
            setTopTitle: function(txt)   { const e = document.getElementById('app-title'); if (e) e.innerText = txt; },
            addTopBtn:   function(text, cls, onClick, prepend = false) {
                const btn = document.createElement('button');
                btn.className = "btn " + cls; btn.innerText = text; btn.onclick = onClick;
                const c = document.getElementById(prepend ? 'top-bar-left' : 'top-bar-right');
                if (prepend) c.insertBefore(btn, c.firstChild); else c.appendChild(btn);
            },
            addTopText: function(txt) {
                const d = document.createElement('div');
                d.style.cssText = "font-size:18px; font-weight:bold;"; d.innerText = txt;
                document.getElementById('top-bar-left').appendChild(d);
            },
            toggleSysFields: function(show) { appState.showSysFields = show; this.renderRecordEditor(appState.activeRecordType); },
            selectField:     function(idx)  {
                appState.selectedFieldIdx = idx;
                document.querySelectorAll('.header-btn').forEach(b => b.classList.remove('selected'));
                const h = document.getElementById('hdr-' + idx); if (h) h.classList.add('selected');
            },
            updateValue: function(rowIdx, colIdx, val) {
                appState.dbData.Values[rowIdx][colIdx] = (val === '' ? null : val);
                this.markDirty();
                this.saveDatabase();
            },
            saveAndRefresh: async function() { await this.saveDatabase(); this.renderRecordEditor(appState.activeRecordType); },
            toggleSelectAll:  function(checked) { document.querySelectorAll('.rec-chk').forEach(c => c.checked = checked); },

            // Safe HTML escape — prevents XSS from field names/values in innerHTML
            esc: function(s) {
                return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
            }
        };

        app.init();
    </script>
</body>
</html>
